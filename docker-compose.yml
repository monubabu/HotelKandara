version: "3.9"

services:
  web:
    build: .
    container_name: hotelkandara_web

    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db

  db:
    image: postgres:17

    container_name: hotelkandara_db

    restart: always

    environment:
      POSTGRES_DB: hotelkandara
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Monu123@

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

volumes:
  postgres_data: